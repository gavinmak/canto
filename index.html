<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#11785e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Canto Study">
<title>Study — Immersion Canto</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="static/apple-touch-icon.png">
<link rel="stylesheet" href="static/app.css">
<style>
  html, body { overflow-x: hidden; max-width: 100%; }
  .swrap { max-width: 680px; margin: 0 auto; padding: 1rem 1rem 5rem; }
  .stophead { display: flex; align-items: baseline; gap: .6rem; margin: .4rem 0 1rem; }
  .stophead h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
                 font-size: 1.5rem; letter-spacing: -.02em; margin: 0; }
  .netdot { width: .6rem; height: .6rem; border-radius: 50%; background: #c44; flex: none; }
  .netdot.online { background: #1c9; }
  .storeline { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted); }
  /* bottom tab bar */
  .tabbar { position: fixed; left: 0; right: 0; bottom: 0; display: flex;
            background: var(--surface); border-top: 1px solid var(--line);
            padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
  .tabbar button { flex: 1; background: none; border: 0; padding: .8rem 0 .9rem;
                   font: inherit; font-size: .82rem; color: var(--muted); cursor: pointer; }
  .tabbar button.active { color: var(--jade); font-weight: 700; }
  .tabbar .badge { display: inline-block; min-width: 1.1em; padding: 0 .3em; margin-left: .2em;
                   font-size: .7rem; background: var(--jade); color: #fff; border-radius: 999px; }
  .panel { display: none; }
  .panel.active { display: block; }
  /* library rows */
  .srcrow { display: flex; align-items: center; gap: .75rem; padding: .7rem 0;
            border-bottom: 1px solid var(--line); }
  .srcrow .meta { flex: 1; min-width: 0; }
  .srcrow .nm { font-weight: 600; font-size: .92rem; line-height: 1.25;
                overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
                -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .srcrow .sub { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted); }
  .srcrow button { flex: none; border: 1px solid var(--line); background: var(--surface);
                   border-radius: 8px; padding: .45rem .7rem; font: inherit; font-size: .8rem;
                   cursor: pointer; }
  .srcrow button.dl { background: var(--jade); color: #fff; border-color: var(--jade); }
  .srcrow button.del { color: #c44; }
  .srcrow button[disabled] { opacity: .5; }
  .prog { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--muted); }
  .emptyhint { color: var(--muted); font-size: .9rem; padding: 1.5rem 0; text-align: center; }
  .searchbox { width: 100%; box-sizing: border-box; padding: .7rem .9rem; font: inherit;
               border: 1px solid var(--line); border-radius: 10px; margin-bottom: .6rem; }
  .savedonly { display: inline-flex; align-items: center; gap: .4rem; margin-bottom: 1rem;
               font-size: .82rem; color: var(--ink-2); cursor: pointer; user-select: none; }
  .savedonly input { accent-color: var(--jade); }
  /* review */
  .revcounts { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--muted); margin-bottom: 1rem; }
  .grades { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; margin-top: 1rem; }
  .grades button { padding: .8rem .2rem; border: 1px solid var(--line); border-radius: 10px;
                   background: var(--surface); font: inherit; font-size: .85rem; cursor: pointer; }
  .grades button small { display: block; font-size: .65rem; color: var(--muted); margin-top: .15rem;
                         font-family: 'JetBrains Mono', monospace; }
  .reveal-btn { width: 100%; padding: .9rem; margin-top: 1rem; border: 1px solid var(--line);
                border-radius: 10px; background: var(--jade); color: #fff; font: inherit; cursor: pointer; }
  /* profile chip in the header + full-screen picker */
  .whoami { margin-left: .5rem; border: 1px solid var(--line); background: var(--surface);
            border-radius: 999px; padding: .25rem .7rem; font: inherit; font-size: .78rem;
            color: var(--ink-2); cursor: pointer; }
  .whoami b { color: var(--jade); }
  .streak { margin-left: auto; font-size: .82rem; font-weight: 700; color: var(--muted);
            white-space: nowrap; }
  .streak.active { color: var(--jade); }
  .profile-gate { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center;
                  justify-content: center; background: var(--paper); }
  .profile-gate[hidden] { display: none; }
  .pg-card { text-align: center; padding: 1.5rem; }
  .pg-card h2 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;
                font-size: 1.4rem; margin: 0 0 1.2rem; }
  .pg-choices { display: flex; gap: 1rem; }
  .pg-btn { padding: 1.1rem 1.6rem; min-width: 7rem; border-radius: 14px; border: 2px solid var(--line);
            background: var(--surface); font: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; }
  .pg-btn.pg-gavin { border-color: #11785e; color: #0c5946; }
  .pg-btn.pg-kita  { border-color: #9b7ef0; color: #6d4bc4; }
  .toast { position: fixed; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
           background: #222; color: #fff; padding: .5rem .9rem; border-radius: 8px;
           font-size: .8rem; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: .95; }
</style>
</head>
<body>
  <div class="swrap">
    <div class="stophead">
      <span class="netdot" id="netdot" title="network"></span>
      <h1>Canto Study</h1>
      <span class="streak" id="streak" title="daily review streak" hidden></span>
      <button class="whoami" id="whoami" hidden></button>
    </div>
    <div class="storeline" id="storeline">—</div>

    <!-- LIBRARY -->
    <section class="panel active" id="panel-lib">
      <p class="emptyhint" id="lib-loading">Connect to your Mac to load the library…</p>
      <div id="lib-list"></div>
    </section>

    <!-- BROWSE -->
    <section class="panel" id="panel-browse">
      <input class="searchbox" id="search" type="search"
             placeholder="Search characters · jyutping · english" autocomplete="off">
      <label class="savedonly"><input type="checkbox" id="saved-only"> Saved only</label>
      <div id="browse-results"></div>
    </section>

    <!-- REVIEW -->
    <section class="panel" id="panel-review">
      <div class="revcounts" id="rev-counts"></div>
      <div id="rev-stage"></div>
    </section>
  </div>

  <nav class="tabbar">
    <button data-tab="lib" class="active">Library</button>
    <button data-tab="browse">Browse</button>
    <button data-tab="review">Review <span class="badge" id="due-badge" hidden>0</span></button>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="profile-gate" id="profile-gate" hidden>
    <div class="pg-card">
      <h2>Who's studying?</h2>
      <div class="pg-choices">
        <button class="pg-btn pg-gavin" data-profile="Gavin">Gavin</button>
        <button class="pg-btn pg-kita" data-profile="Kita">Kita</button>
      </div>
    </div>
  </div>

  <script>window.CANTO_STATIC=true;</script>
  <script src="static/tones.js"></script>
  <script src="static/dict.js"></script>
  <script src="static/study.js"></script>
</body>
</html>
